<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Void Survivors</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #000;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      overflow: hidden;
    }
    canvas { display: block; }
  </style>
</head>
<body>

  <!-- Phaser 3 CDN -->
  <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>

  <!-- 설정 먼저 로드 -->
  <script src="src/config/GameConfig.js"></script>

  <!-- 엔티티 로드 (씬보다 먼저) -->
  <script src="src/entities/Player.js"></script>
  <script src="src/entities/Projectile.js"></script>
  <script src="src/entities/Enemy.js"></script>
  <script src="src/entities/Boss.js"></script>
  <script src="src/entities/Item.js"></script>

  <!-- 시스템 로드 (씬보다 먼저) -->
  <script src="src/systems/AttackSystem.js"></script>
  <script src="src/systems/WaveSystem.js"></script>
  <script src="src/systems/ItemSystem.js"></script>
  <script src="src/systems/LevelSystem.js"></script>

  <!-- 씬 로드 -->
  <script src="src/scenes/BootScene.js"></script>
  <script src="src/scenes/GameScene.js"></script>

  <!-- Phaser 게임 초기화 -->
  <script>
    new Phaser.Game({
      type: Phaser.AUTO,
      width:  GameConfig.WIDTH,
      height: GameConfig.HEIGHT,
      backgroundColor: '#' + GameConfig.COLOR.BACKGROUND.toString(16).padStart(6, '0'),
      scene: [BootScene, GameScene],
      parent: document.body,
      scale: {
        mode: Phaser.Scale.FIT,
        autoCenter: Phaser.Scale.CENTER_BOTH,
      },
    });
  </script>

</body>
</html>
